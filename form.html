<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Submit Problem</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
width:400px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#2e7d32;
color:white;
padding:10px;
border:none;
width:100%;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

#msg{
margin-top:15px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Report Problem</h2>

<form id="reportForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Problem</label>
<textarea id="problem" required></textarea>

<button type="submit">Submit</button>

</form>

<div id="msg"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxDg1g9TPA7zl4GZulzinVQ7n7P8RLU6qeMyQ2I27GfOsmY2jNtX0Rqu3-KTLIK6T4W/exec";

document.getElementById("reportForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let problem = document.getElementById("problem").value;

fetch(scriptURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
problem:problem
})
})
.then(res => res.json())
.then(data => {

if(data.status === "success"){
document.getElementById("msg").innerHTML = "ส่งข้อมูลเรียบร้อยแล้ว";
document.getElementById("reportForm").reset();
}

})
.catch(err=>{
document.getElementById("msg").innerHTML = "เกิดข้อผิดพลาด";
console.log(err);
});

});

</script>

</body>
</html>
